# Builds the plex-media-tiering image and publishes to Docker Hub.
#
# Triggers:
#   - push to main         -> :latest + :main + :sha-<short>
#   - push to other branch -> :<branch> + :sha-<short>
#   - pull request (same-repo) -> :pr-<N> + :sha-<short>  (fork PRs: build only, no push)
#   - tag v*.*.*           -> :1.2.3 + :1.2 + :1 + :latest + :sha-<short>
#   - manual (workflow_dispatch) -> whatever branch/tag you pick
#
# Unraid's Community Applications updater polls the image digest of the
# tag the template pins. Pinning the CA template to ":latest" gives
# auto-updates on every main push; pinning to ":1" gives auto-updates
# for minor/patch releases only.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN      (Read+Write access token, not your password)
#
# Required repo variable (optional):
#   DOCKERHUB_IMAGE      e.g. "dazzathewiz/plex-media-tiering"  (defaults to
#                        "${{ secrets.DOCKERHUB_USERNAME }}/plex-media-tiering")

name: docker-publish

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: img
        run: |
          IMAGE="${{ vars.DOCKERHUB_IMAGE }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/plex-media-tiering"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=plex-media-tiering
            org.opencontainers.image.description=Unraid media tiering script (Plex-driven, hot/warm ZFS + array)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.img.outputs.image }}
          readme-filepath: ./README.md
          short-description: Unraid media tiering script (Plex-driven hot/warm placement)
